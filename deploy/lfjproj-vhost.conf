<VirtualHost *:80>
    ServerName lfjproj.local
    ServerAlias www.lfjproj.local
    DocumentRoot "C:/wamp/www/lfjproj/backend/public"
    <Directory "C:/wamp/www/lfjproj/backend/public">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog "${INSTALL_DIR}/logs/lfjproj-error.log"
    CustomLog "${INSTALL_DIR}/logs/lfjproj-access.log" combined
</VirtualHost>
