name: "Pricing Domain Quality"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

permissions:
  contents: read

concurrency:
  group: pricing-domain-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pint:
    name: Pint (format check)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite

      - name: Restore composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite
        env:
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run Pint (pricing domain)
        run: php vendor/bin/pint --test app/Domain/Pricing tests/Unit/Services

  phpstan:
    name: PHPStan (Larastan)
    runs-on: ubuntu-latest
    needs: pint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite

      - name: Restore composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Run PHPStan (pricing domain)
        run: php vendor/bin/phpstan analyse -c phpstan.neon --memory-limit=1G

  tests:
    name: Pricing tests (Pest / Unit)
    runs-on: ubuntu-latest
    needs: [pint, phpstan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite

      - name: Restore composer cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Prepare environment and migrations
        run: |
          cp .env.example .env
          php artisan key:generate
          mkdir -p database
          touch database/database.sqlite
          php artisan migrate --force || true
        env:
          APP_ENV: testing
          CACHE_DRIVER: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      - name: Run pricing tests only
        run: php vendor/bin/pest tests/Unit/PricingEngineTest.php tests/Unit/Services --colors=never

# Notes:
# - This workflow scopes formatting, static analysis, and tests to the pricing domain only.
# - It uses PHP 8.3 and caches Composer packages for faster runs.
# - Failure policy: jobs will fail only if the pricing-domain Pint, PHPStan, or pricing tests fail.
# - Future jobs (integration, coverage, security) can be added as separate jobs that `needs` these checks.
