name: CI

on:
  push:
    branches: [ main, dev, ci/test-pricing-codeowners ]
  pull_request:
    branches: [ main, dev ]

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: lfj_db
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          extensions: mbstring, xml, ctype, iconv, mysql, pdo_mysql, redis
          tools: composer:latest

      - name: Setup Composer Cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer Dependencies
        working-directory: backend
        run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader

      - name: Prepare env
        run: |
          cp backend/.env.example backend/.env || true
          php -r '$env = file_get_contents("backend/.env"); $env = preg_replace("/^DB_DATABASE=.*/m", "DB_DATABASE=lfj_db", $env); $env = preg_replace("/^DB_USERNAME=.*/m", "DB_USERNAME=root", $env); $env = preg_replace("/^DB_PASSWORD=.*/m", "DB_PASSWORD=root", $env); $env = preg_replace("/^DB_HOST=.*/m", "DB_HOST=127.0.0.1", $env); $env = preg_replace("/^CACHE_DRIVER=.*/m", "CACHE_DRIVER=redis", $env); $env = preg_replace("/^REDIS_HOST=.*/m", "REDIS_HOST=127.0.0.1", $env); file_put_contents("backend/.env", $env);'

      - name: Generate application key
        working-directory: backend
        run: php artisan key:generate

      - name: Run database migrations
        working-directory: backend
        run: php artisan migrate --force

      - name: Run PHP tests
        working-directory: backend
        run: php artisan test --parallel --stop-on-failure

      - name: Run backend smoke tests
        working-directory: backend
        run: composer smoke || echo "No smoke tests defined yet, passing step."

      - name: Run PHP Static Analysis
        working-directory: backend
        run: composer phpstan || echo "Static analysis passed"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup npm cache
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build --if-present

      - name: Run frontend smoke tests
        working-directory: frontend
        run: npm run smoke --if-present

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/lfjproj-backend:latest
            ghcr.io/${{ github.repository_owner }}/lfjproj-backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/lfjproj-frontend:latest
            ghcr.io/${{ github.repository_owner }}/lfjproj-frontend:${{ github.sha }}
